import os
import requests
import json
import argparse
from datetime import datetime, timedelta
from pathlib import Path

# Configuration
DEFAULT_USERNAME = "CreepyLewis"
CACHE_FILE = "stats/cache.json"
CACHE_DAYS = 1  # Cache data for 1 day

# Themes
THEMES = {
    "dark": {
        "bg": "#161b22",
        "text": "#c9d1d9",
        "text_secondary": "#8b949e",
        "accent": "#ff9f1c",
        "dot_colors": ["#161b22", "#0e4429", "#006d32", "#26a641", "#39d353"]
    },
    "light": {
        "bg": "#ffffff",
        "text": "#24292e",
        "text_secondary": "#586069",
        "accent": "#0366d6",
        "dot_colors": ["#ebedf0", "#9be9a8", "#40c463", "#30a14e", "#216e39"]
    }
}

def parse_arguments():
    """Parse command line arguments"""
    parser = argparse.ArgumentParser(description="Generate GitHub contribution stats SVG")
    parser.add_argument("--username", default=DEFAULT_USERNAME, help="GitHub username")
    parser.add_argument("--output", default="stats/stats.svg", help="Output SVG path")
    parser.add_argument("--width", type=int, default=800, help="SVG width")
    parser.add_argument("--height", type=int, default=220, help="SVG height")
    parser.add_argument("--theme", default="dark", choices=THEMES.keys(), help="SVG theme")
    parser.add_argument("--no-cache", action="store_true", help="Ignore cache and fetch fresh data")
    return parser.parse_args()

def fetch_github_data(username, token, use_cache=True):
    """Fetch contribution data from GitHub API with caching"""
    
    # Check cache if enabled
    if use_cache and Path(CACHE_FILE).exists():
        with open(CACHE_FILE, 'r') as f:
            cache = json.load(f)
        
        cache_date = datetime.fromisoformat(cache["date"])
        if (datetime.now() - cache_date).days < CACHE_DAYS and cache.get("username") == username:
            print("Using cached data")
            return cache["days"]
    
    # Fetch fresh data
    print("Fetching fresh data from GitHub API")
    headers = {
        "Authorization": f"Bearer {token}",
        "Content-Type": "application/json"
    }
    
    query = """
    query($login: String!) {
      user(login: $login) {
        contributionsCollection {
          contributionCalendar {
            weeks {
              contributionDays {
                contributionCount
                date
              }
            }
          }
        }
      }
    }
    """
    
    try:
        response = requests.post(
            "https://api.github.com/graphql",
            json={"query": query, "variables": {"login": username}},
            headers=headers,
            timeout=10
        )
        response.raise_for_status()
        
        data = response.json()
        
        if "errors" in data:
            raise Exception(f"GitHub API error: {data['errors']}")
        
        weeks = data["data"]["user"]["contributionsCollection"]["contributionCalendar"]["weeks"]
        days = [day for week in weeks for day in week["contributionDays"]]
        
        # Save to cache
        os.makedirs(os.path.dirname(CACHE_FILE), exist_ok=True)
        with open(CACHE_FILE, 'w') as f:
            json.dump({
                "date": datetime.now().isoformat(),
                "username": username,
                "days": days
            }, f)
        
        return days
        
    except requests.exceptions.RequestException as e:
        print(f"API request failed: {e}")
        # Try to return cached data even if expired as fallback
        if Path(CACHE_FILE).exists():
            with open(CACHE_FILE, 'r') as f:
                cache = json.load(f)
            print("Using cached data as fallback")
            return cache["days"]
        raise Exception(f"Failed to fetch data and no cache available: {e}")

def calculate_stats(days):
    """Calculate contribution statistics"""
    total = sum(day["contributionCount"] for day in days)
    
    # Current streak (from most recent day)
    current_streak = 0
    for day in reversed(days):
        if day["contributionCount"] > 0:
            current_streak += 1
        else:
            break
    
    # Longest streak
    longest_streak = temp = 0
    for day in days:
        if day["contributionCount"] > 0:
            temp += 1
            longest_streak = max(longest_streak, temp)
        else:
            temp = 0
    
    return total, current_streak, longest_streak

def generate_contribution_dots(days, theme, max_dots=53):
    """Generate mini contribution graph dots"""
    dots = ""
    x_pos = 30
    recent_days = days[-max_dots:]  # Last max_dots days
    
    for i, day in enumerate(recent_days):
        count = day["contributionCount"]
        
        # Determine dot color intensity
        if count == 0:
            color_idx = 0
        elif count < 3:
            color_idx = 1
        elif count < 6:
            color_idx = 2
        elif count < 10:
            color_idx = 3
        else:
            color_idx = 4
        
        fill = theme["dot_colors"][color_idx]
        
        # Add tooltip with date and count
        date = datetime.strptime(day["date"], "%Y-%m-%d").strftime("%b %d, %Y")
        dots += f'''
        <rect x="{x_pos + i*12}" y="175" width="10" height="10" rx="2" fill="{fill}">
            <title>{date}: {count} contribution{"s" if count != 1 else ""}</title>
        </rect>'''
    
    return dots

def create_error_svg(error_message, args):
    """Create an error SVG when things go wrong"""
    theme = THEMES[args.theme]
    
    svg = f'''<svg width="{args.width}" height="{args.height}" xmlns="http://www.w3.org/2000/svg">
    <rect width="{args.width}" height="{args.height}" rx="16" fill="{theme['bg']}"/>
    <text x="30" y="50" fill="{theme['accent']}" font-size="18" font-family="monospace">
        GITHUB ACTIVITY - ERROR
    </text>
    <text x="30" y="100" fill="{theme['text_secondary']}" font-size="13" font-family="monospace">
        Failed to fetch data:
    </text>
    <text x="30" y="130" fill="{theme['text']}" font-size="13" font-family="monospace">
        {error_message[:50]}...
    </text>
    <text x="30" y="170" fill="{theme['text_secondary']}" font-size="11" font-family="monospace">
        Generated: {datetime.now().strftime("%Y-%m-%d %H:%M")}
    </text>
    </svg>'''
    
    return svg

def main():
    """Main function to generate stats SVG"""
    args = parse_arguments()
    
    # Get GitHub token
    token = os.environ.get("GH_TOKEN")
    if not token:
        raise Exception("GH_TOKEN environment variable not found")
    
    try:
        # Fetch data
        days = fetch_github_data(args.username, token, use_cache=not args.no_cache)
        
        # Calculate statistics
        total, current_streak, longest_streak = calculate_stats(days)
        
        # Get date range
        start_date = datetime.strptime(days[0]["date"], "%Y-%m-%d")
        end_date = datetime.strptime(days[-1]["date"], "%Y-%m-%d")
        date_range = f"{start_date.strftime('%b %d, %Y')} – {end_date.strftime('%b %d, %Y')}"
        
        # Get theme
        theme = THEMES[args.theme]
        
        # Generate contribution dots
        contribution_dots = generate_contribution_dots(days, theme)
        
        # Generate SVG
        svg = f'''<svg width="{args.width}" height="{args.height}" xmlns="http://www.w3.org/2000/svg">
    <rect width="{args.width}" height="{args.height}" rx="16" fill="{theme['bg']}"/>
    
    <!-- Header -->
    <text x="30" y="35" fill="{theme['accent']}" font-size="18" font-family="monospace">
        GITHUB ACTIVITY - @{args.username}
    </text>
    
    <!-- Total Contributions -->
    <text x="30" y="75" fill="{theme['text_secondary']}" font-size="13" font-family="monospace">
        Total Contributions
    </text>
    <text x="30" y="110" fill="{theme['text']}" font-size="28" font-family="monospace" font-weight="bold">
        {total:,}
    </text>
    
    <!-- Current Streak -->
    <text x="300" y="75" fill="{theme['text_secondary']}" font-size="13" font-family="monospace">
        Current Streak
    </text>
    <text x="300" y="110" fill="{theme['text']}" font-size="28" font-family="monospace" font-weight="bold">
        {current_streak} day{'' if current_streak == 1 else 's'}
    </text>
    
    <!-- Longest Streak -->
    <text x="550" y="75" fill="{theme['text_secondary']}" font-size="13" font-family="monospace">
        Longest Streak
    </text>
    <text x="550" y="110" fill="{theme['text']}" font-size="28" font-family="monospace" font-weight="bold">
        {longest_streak} day{'' if longest_streak == 1 else 's'}
    </text>
    
    <!-- Date Range -->
    <text x="30" y="150" fill="{theme['text_secondary']}" font-size="12" font-family="monospace">
        {date_range}
    </text>
    
    <!-- Contribution Graph Label -->
    <text x="30" y="170" fill="{theme['text_secondary']}" font-size="10" font-family="monospace">
        Recent activity:
    </text>
    
    <!-- Contribution Dots -->
    {contribution_dots}
    
    <!-- Generated timestamp -->
    <text x="{args.width - 30}" y="{args.height - 15}" fill="{theme['text_secondary']}" font-size="9" font-family="monospace" text-anchor="end">
        Updated: {datetime.now().strftime("%Y-%m-%d %H:%M UTC")}
    </text>
    </svg>'''
        
    except Exception as e:
        print(f"Error generating stats: {e}")
        svg = create_error_svg(str(e), args)
    
    # Save SVG
    os.makedirs(os.path.dirname(args.output), exist_ok=True)
    with open(args.output, "w") as f:
        f.write(svg)
    
    print(f"SVG generated successfully: {args.output}")

if __name__ == "__main__":
    main()
