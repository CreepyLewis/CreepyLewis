import os
import requests
import json
import argparse
from datetime import datetime, timezone
from pathlib import Path

# =============================
# CONFIGURATION
# =============================
DEFAULT_USERNAME = "CreepyLewis"
CACHE_FILE = "stats/cache.json"
CACHE_DAYS = 1  # Cache duration in days

THEMES = {
    "dark": {
        "bg": "#161b22",
        "text": "#c9d1d9",
        "text_secondary": "#8b949e",
        "accent": "#ff9f1c",
        "dot_colors": ["#161b22", "#0e4429", "#006d32", "#26a641", "#39d353"]
    },
    "light": {
        "bg": "#ffffff",
        "text": "#24292e",
        "text_secondary": "#586069",
        "accent": "#0366d6",
        "dot_colors": ["#ebedf0", "#9be9a8", "#40c463", "#30a14e", "#216e39"]
    }
}

# =============================
# ARGUMENT PARSER
# =============================
def parse_arguments():
    parser = argparse.ArgumentParser(description="Generate GitHub contribution stats SVG")
    parser.add_argument("--username", default=DEFAULT_USERNAME)
    parser.add_argument("--output", default="stats/stats.svg")
    parser.add_argument("--width", type=int, default=800)
    parser.add_argument("--height", type=int, default=220)
    parser.add_argument("--theme", default="dark", choices=THEMES.keys())
    parser.add_argument("--no-cache", action="store_true")
    return parser.parse_args()

# =============================
# FETCH DATA (WITH CACHE)
# =============================
def fetch_github_data(username, token, use_cache=True):
    os.makedirs(os.path.dirname(CACHE_FILE), exist_ok=True)

    # Try cache first
    if use_cache and Path(CACHE_FILE).exists():
        try:
            with open(CACHE_FILE, "r") as f:
                cache = json.load(f)
            cache_date = datetime.fromisoformat(cache["date"])
            if (
                (datetime.now(timezone.utc) - cache_date).days < CACHE_DAYS
                and cache.get("username") == username
            ):
                print("Using cached data")
                return cache["days"]
        except Exception:
            pass  # Ignore corrupted cache

    print("Fetching fresh data from GitHub API")

    headers = {
        "Authorization": f"Bearer {token}",
        "Content-Type": "application/json"
    }

    query = """
    query($login: String!) {
      user(login: $login) {
        contributionsCollection {
          contributionCalendar {
            weeks {
              contributionDays {
                contributionCount
                date
              }
            }
          }
        }
      }
    }
    """

    try:
        response = requests.post(
            "https://api.github.com/graphql",
            json={"query": query, "variables": {"login": username}},
            headers=headers,
            timeout=15
        )
        response.raise_for_status()
        data = response.json()
        if "errors" in data:
            raise Exception(data["errors"])
    except Exception as e:
        raise Exception(f"Failed to fetch GitHub data: {e}")

    weeks = data.get("data", {}).get("user", {}).get("contributionsCollection", {}).get("contributionCalendar", {}).get("weeks", [])
    days = [day for week in weeks for day in week.get("contributionDays", [])]

    # Save cache
    with open(CACHE_FILE, "w") as f:
        json.dump({
            "date": datetime.now(timezone.utc).isoformat(),
            "username": username,
            "days": days
        }, f)

    return days

# =============================
# CALCULATE STATS
# =============================
def calculate_stats(days):
    today = datetime.now(timezone.utc).date()
    valid_days = [day for day in days if datetime.strptime(day["date"], "%Y-%m-%d").date() <= today]

    total = sum(day.get("contributionCount", 0) for day in valid_days)

    # Current streak
    current_streak = 0
    for day in reversed(valid_days):
        if day.get("contributionCount", 0) > 0:
            current_streak += 1
        else:
            break

    # Longest streak
    longest_streak = 0
    temp = 0
    for day in valid_days:
        if day.get("contributionCount", 0) > 0:
            temp += 1
            longest_streak = max(longest_streak, temp)
        else:
            temp = 0

    return total, current_streak, longest_streak, valid_days

# =============================
# GENERATE DOTS
# =============================
def generate_contribution_dots(days, theme, max_dots=53):
    dots = ""
    x_start = 30
    y_pos = 175
    recent_days = days[-max_dots:]

    for i, day in enumerate(recent_days):
        count = day.get("contributionCount", 0)
        if count == 0:
            color_idx = 0
        elif count < 3:
            color_idx = 1
        elif count < 6:
            color_idx = 2
        elif count < 10:
            color_idx = 3
        else:
            color_idx = 4

        fill = theme["dot_colors"][color_idx]
        date = datetime.strptime(day["date"], "%Y-%m-%d").strftime("%b %d, %Y")

        dots += f"""
        <rect x="{x_start + i*12}" y="{y_pos}" width="10" height="10" rx="2" fill="{fill}">
            <title>{date}: {count} contribution{"s" if count != 1 else ""}</title>
        </rect>
        """
    return dots

# =============================
# ERROR SVG
# =============================
def create_error_svg(message, args):
    theme = THEMES[args.theme]
    return f"""
    <svg width="{args.width}" height="{args.height}" xmlns="http://www.w3.org/2000/svg">
        <rect width="100%" height="100%" rx="16" fill="{theme['bg']}"/>
        <text x="30" y="50" fill="{theme['accent']}" font-size="18" font-family="monospace">
            GITHUB ACTIVITY - ERROR
        </text>
        <text x="30" y="100" fill="{theme['text']}" font-size="13" font-family="monospace">
            {str(message)[:80]}
        </text>
    </svg>
    """

# =============================
# MAIN
# =============================
def main():
    args = parse_arguments()
    token = os.environ.get("GH_TOKEN")

    # Ensure output folder exists
    os.makedirs(os.path.dirname(args.output), exist_ok=True)

    if not token:
        print("Error: GH_TOKEN environment variable not found.")
        svg = create_error_svg("GH_TOKEN not found", args)
        with open(args.output, "w") as f:
            f.write(svg)
        return

    try:
        days = fetch_github_data(args.username, token, use_cache=not args.no_cache)
        if not days:
            raise Exception("No contribution data found")

        total, current_streak, longest_streak, valid_days = calculate_stats(days)

        start_date = datetime.strptime(valid_days[0]["date"], "%Y-%m-%d") if valid_days else datetime.now()
        end_date = datetime.strptime(valid_days[-1]["date"], "%Y-%m-%d") if valid_days else datetime.now()
        date_range = f"{start_date.strftime('%b %d, %Y')} – {end_date.strftime('%b %d, %Y')}"

        theme = THEMES[args.theme]
        dots = generate_contribution_dots(valid_days, theme)

        svg = f"""
<svg width="{args.width}" height="{args.height}" xmlns="http://www.w3.org/2000/svg">
<rect width="100%" height="100%" rx="16" fill="{theme['bg']}"/>

<text x="30" y="35" fill="{theme['accent']}" font-size="18" font-family="monospace">
GITHUB ACTIVITY - @{args.username}
</text>

<text x="30" y="75" fill="{theme['text_secondary']}" font-size="13" font-family="monospace">
Total Contributions
</text>
<text x="30" y="110" fill="{theme['text']}" font-size="28" font-family="monospace" font-weight="bold">
{total:,}
</text>

<text x="300" y="75" fill="{theme['text_secondary']}" font-size="13" font-family="monospace">
Current Streak
</text>
<text x="300" y="110" fill="{theme['text']}" font-size="28" font-family="monospace" font-weight="bold">
{current_streak} day{'s' if current_streak != 1 else ''}
</text>

<text x="550" y="75" fill="{theme['text_secondary']}" font-size="13" font-family="monospace">
Longest Streak
</text>
<text x="550" y="110" fill="{theme['text']}" font-size="28" font-family="monospace" font-weight="bold">
{longest_streak} day{'s' if longest_streak != 1 else ''}
</text>

<text x="30" y="150" fill="{theme['text_secondary']}" font-size="12" font-family="monospace">
{date_range}
</text>

<text x="30" y="170" fill="{theme['text_secondary']}" font-size="10" font-family="monospace">
Recent activity:
</text>

{dots}

<text x="{args.width - 30}" y="{args.height - 15}" fill="{theme['text_secondary']}" font-size="9" font-family="monospace" text-anchor="end">
Updated: {datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")}
</text>

</svg>
        """

    except Exception as e:
        print("Error:", e)
        svg = create_error_svg(e, args)

    # Write final SVG
    with open(args.output, "w") as f:
        f.write(svg)

    print(f"SVG generated: {args.output}")

if __name__ == "__main__":
    main()
